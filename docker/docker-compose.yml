services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gotaxi_postgres
    environment:
      POSTGRES_USER: gotaxi
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: gotaxi
    ports:
      - "5439:5432"
    volumes:
      - gotaxi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotaxi -d gotaxi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gotaxi_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gotaxi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gotaxi.bj
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gotaxi_network

  redis:
    image: redis:7-alpine
    container_name: gotaxi_redis
    ports:
      - "6380:6379"
    volumes:
      - gotaxi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gotaxi_network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gotaxi_api
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - gotaxi_network

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gotaxi_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    networks:
      - gotaxi_network

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gotaxi_celery_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    networks:
      - gotaxi_network

networks:
  gotaxi_network:
    driver: bridge

volumes:
  gotaxi_postgres_data:
  gotaxi_redis_data: